[paths]
input_dir = "./input"
output_dir = "./tagged"
review_dir = "./review"
archive_dir = "./archive"
report_dir = "./reports"

[recognition]
songrec_path = "songrec"
ffmpeg_path = "ffmpeg"
timeout_seconds = 45

[metadata]
primary_source = "apple"
use_musicbrainz = false
download_artwork = true
artwork_size = 1200

[scoring]
auto_tag_threshold = 90
review_threshold = 75
duration_tolerance_seconds = 3

[tagging]
id3_version = "2.4"
embed_artwork = true
embed_lyrics = false
write_sort_fields = true
preserve_existing_when_missing = true

[safety]
dry_run_default = true
backup_before_write = true
modify_originals = false
copy_to_output = true

[naming]
rename_output_files = true
template = "{artist} - {title}.mp3"
sanitize_filenames = true
